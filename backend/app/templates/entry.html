<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Score Entry for Macropolo Tiles - 2024</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <style>
    [x-cloak] { display: none !important; }
    .gradient-bg { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .glass-effect {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .score-input:focus {
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .progress-ring {
      transform: rotate(-90deg);
    }
    .progress-ring-circle {
      transition: stroke-dashoffset 0.5s ease;
    }
    .hover-lift:hover {
      transform: translateY(-2px);
      transition: transform 0.2s ease;
    }
    .fade-in {
      animation: fadeIn 0.5s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pulse-glow {
      animation: pulseGlow 2s infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.5); }
      50% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.8); }
    }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-blue-50 min-h-screen font-sans">
  <div class="container mx-auto px-4 py-6" x-data="scoreEntry()" x-init="init()">
    
    <!-- Header Section -->
    <div class="gradient-bg text-white rounded-3xl p-8 mb-8 shadow-2xl relative overflow-hidden">
      <!-- Background Pattern -->
      <div class="absolute inset-0 opacity-10">
        <div class="absolute top-0 right-0 w-64 h-64 bg-white rounded-full -mr-32 -mt-32"></div>
        <div class="absolute bottom-0 left-0 w-48 h-48 bg-white rounded-full -ml-24 -mb-24"></div>
      </div>
      
      <div class="relative flex flex-col lg:flex-row justify-between items-start lg:items-center space-y-6 lg:space-y-0">
        <!-- Logo and Title -->
        <div class="flex items-center space-x-6">
          <div class="relative group cursor-pointer" @click="showLogoModal = true">
            <div class="relative">
              <img :src="subsidiaryLogo" alt="Macropolo Tiles Logo" 
                   class="w-20 h-20 lg:w-24 lg:h-24 rounded-2xl border-4 border-white shadow-2xl object-cover bg-white hover:scale-105 transition-transform duration-300">
              <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-40 rounded-2xl flex items-center justify-center transition-all duration-300">
                <i class="fas fa-camera text-white text-lg opacity-0 group-hover:opacity-100 transition-opacity duration-300"></i>
              </div>
            </div>
          </div>
          
          <div class="space-y-2">
            <div class="flex items-center space-x-3">
              <h1 class="text-2xl lg:text-3xl font-bold">Performance Score Entry</h1>
              <span class="px-3 py-1 glass-effect rounded-full text-sm font-medium">
                <i class="fas fa-calendar-alt mr-1"></i>2024
              </span>
            </div>
            <h2 class="text-xl lg:text-2xl font-semibold opacity-95">Macropolo Tiles</h2>
            <p class="text-sm opacity-80 flex items-center space-x-2">
              <i class="fas fa-building"></i>
              <span>Manufacturing</span>
              <i class="fas fa-chevron-right text-xs"></i>
              <span>Manufacturing and Agriculture</span>
            </p>
          </div>
        </div>
        
        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row items-stretch sm:items-center space-y-3 sm:space-y-0 sm:space-x-4">
          <div class="flex items-center space-x-3">
            <span class="px-4 py-2 glass-effect rounded-xl text-sm font-medium flex items-center space-x-2">
              <i class="fas fa-circle text-green-400"></i>
              <span>Active</span>
            </span>
          </div>
          <a href="#" 
             class="flex items-center justify-center px-6 py-3 glass-effect rounded-xl hover:bg-white hover:bg-opacity-20 transition-all duration-300 group">
            <i class="fas fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i>
            Back to Subsidiaries
          </a>
        </div>
      </div>
    </div>

    <!-- Year Selection & Stats -->
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
      <!-- Year Selection -->
      <div class="lg:col-span-1">
        <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 h-full">
          <label class="block text-sm font-semibold text-gray-700 mb-3 flex items-center">
            <i class="fas fa-calendar-week mr-2 text-blue-500"></i>
            Fiscal Year
          </label>
          <select id="year" name="year_id" 
                  class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all bg-white shadow-sm">
            <option value="2024" selected>2024 ★ Active</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
          </select>
          <div class="mt-4 text-center text-sm text-gray-500">
            <div class="grid grid-cols-2 gap-2">
              <div class="bg-gray-50 p-2 rounded-lg">
                <div class="font-bold text-blue-600" x-text="categories.length"></div>
                <div>Categories</div>
              </div>
              <div class="bg-gray-50 p-2 rounded-lg">
                <div class="font-bold text-green-600" x-text="totalKPIs"></div>
                <div>Total KPIs</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Performance Summary Cards -->
      <div class="lg:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Overall Score Card -->
        <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 hover-lift group">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Overall Score</h3>
            <i class="fas fa-chart-line text-blue-500 text-lg"></i>
          </div>
          <div class="flex items-end justify-between">
            <div>
              <div class="text-3xl font-bold text-gray-800 mb-2" x-text="overallScore.toFixed(1)"></div>
              <div class="text-sm" :class="scoreColorClass(overallScore, true)" x-text="performanceGrade.label"></div>
            </div>
            <div class="relative w-16 h-16">
              <svg class="w-16 h-16 transform -rotate-90">
                <circle cx="32" cy="32" r="28" stroke="#e5e7eb" stroke-width="6" fill="none"/>
                <circle cx="32" cy="32" r="28" :stroke="scoreColorClass(overallScore, false)" stroke-width="6" 
                        fill="none" stroke-dasharray="175.93" :stroke-dashoffset="175.93 - (175.93 * overallScore / 100)"/>
              </svg>
              <div class="absolute inset-0 flex items-center justify-center">
                <span class="text-sm font-bold" :class="scoreColorClass(overallScore, true)" x-text="performanceGrade.grade"></span>
              </div>
            </div>
          </div>
        </div>

        <!-- Progress Card -->
        <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 hover-lift group">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Progress</h3>
            <i class="fas fa-tasks text-green-500 text-lg"></i>
          </div>
          <div class="space-y-3">
            <div>
              <div class="flex justify-between text-sm text-gray-600 mb-1">
                <span>KPIs Completed</span>
                <span x-text="`${completedKPIs}/${totalKPIs}`"></span>
              </div>
              <div class="w-full bg-gray-200 rounded-full h-2">
                <div class="h-2 rounded-full transition-all duration-500 bg-green-500" 
                     :style="`width: ${(completedKPIs/totalKPIs)*100}%`"></div>
              </div>
            </div>
            <div>
              <div class="flex justify-between text-sm text-gray-600 mb-1">
                <span>Weight Used</span>
                <span x-text="`${totalUsedWeight.toFixed(1)}/${totalAvailableWeight}`"></span>
              </div>
              <div class="w-full bg-gray-200 rounded-full h-2">
                <div class="h-2 rounded-full transition-all duration-500" 
                     :class="weightUtilization > 100 ? 'bg-red-500' : weightUtilization > 90 ? 'bg-yellow-500' : 'bg-blue-500'"
                     :style="`width: ${Math.min(100, weightUtilization)}%`"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Quick Actions Card -->
        <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 hover-lift group">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Quick Actions</h3>
            <i class="fas fa-bolt text-purple-500 text-lg"></i>
          </div>
          <div class="space-y-3">
            <button @click="validateScores" 
                    class="w-full flex items-center justify-center px-4 py-3 bg-blue-50 text-blue-700 rounded-xl hover:bg-blue-100 transition-all duration-300 group">
              <i class="fas fa-check-circle mr-2 group-hover:scale-110 transition-transform"></i>
              Validate Scores
            </button>
            <button @click="showLogoModal = true" 
                    class="w-full flex items-center justify-center px-4 py-3 bg-purple-50 text-purple-700 rounded-xl hover:bg-purple-100 transition-all duration-300 group">
              <i class="fas fa-camera mr-2 group-hover:scale-110 transition-transform"></i>
              Update Logo
            </button>
            <button @click="exportScores" 
                    class="w-full flex items-center justify-center px-4 py-3 bg-green-50 text-green-700 rounded-xl hover:bg-green-100 transition-all duration-300 group">
              <i class="fas fa-download mr-2 group-hover:scale-110 transition-transform"></i>
              Export Data
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Score Entry Form -->
    <template x-if="categories.length > 0">
      <form id="scoreForm" @submit.prevent="submitScores" class="space-y-6">
        <!-- Categories -->
        <template x-for="(category, catIndex) in categories" :key="category.id">
          <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden hover-lift fade-in"
               :style="`animation-delay: ${catIndex * 100}ms`">
            <!-- Category Header -->
            <div class="bg-gradient-to-r from-blue-50 to-indigo-50 p-6 border-b border-gray-200">
              <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center space-y-4 lg:space-y-0">
                <div class="flex-1">
                  <div class="flex items-center space-x-3 mb-3">
                    <div class="w-3 h-8 bg-blue-500 rounded-full"></div>
                    <h3 class="text-xl font-bold text-gray-800" x-text="category.name"></h3>
                    <span class="px-3 py-1 bg-white rounded-full text-sm font-medium text-blue-700 shadow-sm">
                      <i class="fas fa-list-ol mr-1"></i>
                      <span x-text="category.kpis.length"></span> KPIs
                    </span>
                  </div>
                  <p class="text-gray-600 text-sm pl-6" x-text="category.description || 'No description available'"></p>
                </div>
                <div class="flex items-center space-x-6">
                  <div class="text-center">
                    <div class="text-2xl font-bold" :class="scoreColorClass(category.avgScore, true)" 
                         x-text="category.avgScore ? category.avgScore.toFixed(1) : 'N/A'"></div>
                    <div class="text-xs text-gray-500">Score</div>
                  </div>
                  <div class="text-center">
                    <div class="text-lg font-semibold text-gray-700" 
                         x-text="`${category.used_weight.toFixed(1)}/${category.weight}`"></div>
                    <div class="text-xs text-gray-500">Weight</div>
                  </div>
                  <div class="relative w-16 h-16">
                    <svg class="w-16 h-16 transform -rotate-90">
                      <circle cx="32" cy="32" r="28" stroke="#e5e7eb" stroke-width="6" fill="none"/>
                      <circle cx="32" cy="32" r="28" 
                              :stroke="weightColorClass(category.used_weight, category.weight)" 
                              stroke-width="6" fill="none" 
                              stroke-dasharray="175.93" 
                              :stroke-dashoffset="175.93 - (175.93 * Math.min(100, (category.used_weight/category.weight)*100) / 100)"/>
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center">
                      <span class="text-xs font-bold text-gray-600" 
                            x-text="`${Math.round((category.used_weight/category.weight)*100)}%`"></span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- KPIs Grid -->
            <div class="p-6">
              <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
                <template x-for="(kpi, kpiIndex) in category.kpis" :key="kpi.id">
                  <div class="group relative">
                    <div class="bg-gray-50 rounded-xl p-5 border-2 border-transparent hover:border-blue-200 hover:shadow-md transition-all duration-300 h-full"
                         :class="{'border-orange-200 bg-orange-50': kpi.weight > (category.weight - category.used_weight + kpi.weight)}">
                      <!-- KPI Header -->
                      <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                          <div class="flex items-center space-x-2 mb-2">
                            <h4 class="font-semibold text-gray-800 text-sm" x-text="kpi.name"></h4>
                            <span class="px-2 py-1 bg-blue-100 text-blue-800 rounded text-xs font-medium" 
                                  x-text="`${kpi.weight} pts`"></span>
                          </div>
                          <p class="text-xs text-gray-500 mb-3 line-clamp-2" x-text="kpi.description || 'No description provided'"></p>
                          <div class="flex items-center space-x-3 text-xs">
                            <span class="flex items-center space-x-1 text-green-600">
                              <i class="fas fa-bullseye"></i>
                              <span x-text="`Target: ${kpi.target || 'N/A'}`"></span>
                            </span>
                            <span class="flex items-center space-x-1 text-purple-600">
                              <i class="fas fa-calculator"></i>
                              <span x-text="kpi.calculation_method || 'Direct'"></span>
                            </span>
                          </div>
                        </div>
                      </div>

                      <!-- Score Input -->
                      <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2 flex items-center justify-between">
                          <span>Performance Score</span>
                          <span class="text-xs text-gray-400">0-100</span>
                        </label>
                        <div class="relative">
                          <input type="number" 
                                 x-model="kpi.score"
                                 @input="updateCalculations()"
                                 class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl score-input focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all bg-white"
                                 min="0" max="100" step="0.1"
                                 placeholder="Enter score..."
                                 :class="{'border-green-300 bg-green-50': kpi.score >= 80, 'border-yellow-300 bg-yellow-50': kpi.score >= 60 && kpi.score < 80, 'border-red-300 bg-red-50': kpi.score < 60}">
                          <span class="absolute right-4 top-3 text-gray-400 font-medium">/100</span>
                        </div>
                      </div>

                      <!-- KPI Metrics -->
                      <div class="space-y-2 text-xs">
                        <div class="flex justify-between items-center">
                          <span class="text-gray-600 flex items-center">
                            <i class="fas fa-gap mr-1"></i>Gap
                          </span>
                          <span :class="gapColorClass((kpi.target || 0) - (kpi.score || 0))" 
                                x-text="`${((kpi.target || 0) - (kpi.score || 0)).toFixed(1)}`"></span>
                        </div>
                        <div class="flex justify-between items-center">
                          <span class="text-gray-600 flex items-center">
                            <i class="fas fa-weight-hanging mr-1"></i>Weighted
                          </span>
                          <span class="font-semibold" 
                                x-text="`${(((kpi.score || 0) * kpi.weight) / 100).toFixed(1)}`"></span>
                        </div>
                        <div class="flex justify-between items-center">
                          <span class="text-gray-600 flex items-center">
                            <i class="fas fa-chart-bar mr-1"></i>Status
                          </span>
                          <span :class="scoreColorClass(kpi.score || 0, true)" 
                                x-text="getScoreStatus(kpi.score || 0)"></span>
                        </div>
                      </div>
                    </div>
                    
                    <!-- Hover Actions -->
                    <div class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                      <button @click="openKpiModal(category.id)" 
                              class="p-2 bg-white rounded-lg shadow-sm hover:bg-blue-50 text-blue-600 transition-colors">
                        <i class="fas fa-edit text-xs"></i>
                      </button>
                    </div>
                  </div>
                </template>
              </div>

              <!-- Add KPI Button -->
              <div class="mt-6 text-center">
                <button type="button" @click="openKpiModal(category.id)" 
                        class="inline-flex items-center px-6 py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-600 hover:border-blue-400 hover:text-blue-600 hover:bg-blue-50 transition-all duration-300 group">
                  <i class="fas fa-plus-circle mr-2 group-hover:scale-110 transition-transform"></i>
                  Add New KPI
                </button>
              </div>
            </div>
          </div>
        </template>

        <!-- Submit Section -->
        <div class="sticky bottom-6 z-10">
          <div class="bg-white rounded-2xl shadow-2xl border border-gray-200 p-6 pulse-glow">
            <div class="flex flex-col lg:flex-row justify-between items-center space-y-4 lg:space-y-0">
              <div class="text-center lg:text-left">
                <div class="text-2xl font-bold" :class="scoreColorClass(overallScore, true)" 
                     x-text="`Final Score: ${overallScore.toFixed(1)}/100`"></div>
                <div class="text-sm text-gray-500 flex items-center space-x-2">
                  <i class="fas fa-award" :class="scoreColorClass(overallScore, true)"></i>
                  <span x-text="performanceGrade.label"></span>
                </div>
              </div>
              <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-4">
                <button type="button" @click="validateScores" 
                        class="px-8 py-3 border-2 border-gray-300 rounded-xl font-semibold text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all flex items-center justify-center">
                  <i class="fas fa-check-circle mr-2"></i>
                  Validate Scores
                </button>
                <button type="submit" :disabled="!scoresValid" 
                        class="px-8 py-3 border border-transparent rounded-xl font-semibold text-white bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg hover:shadow-xl flex items-center justify-center">
                  <i class="fas fa-paper-plane mr-2"></i>
                  Submit All Scores
                </button>
              </div>
            </div>
          </div>
        </div>
      </form>
    </template>

    <!-- Empty State -->
    <template x-if="categories.length === 0">
      <div class="bg-white rounded-2xl shadow-lg border border-gray-200 p-12 text-center">
        <div class="max-w-md mx-auto">
          <div class="w-24 h-24 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-exclamation-triangle text-yellow-500 text-3xl"></i>
          </div>
          <h3 class="text-2xl font-bold text-gray-800 mb-4">No Categories/KPIs Found</h3>
          <p class="text-gray-600 mb-6">
            No performance categories or KPIs have been set up for Macropolo Tiles for the year 2024. 
            Please set them up in the Data Management System or select a different year.
          </p>
          <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="#" 
               class="inline-flex items-center px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-colors">
              <i class="fas fa-cog mr-2"></i>
              Data Management
            </a>
            <a href="#" 
               class="inline-flex items-center px-6 py-3 border border-gray-300 text-gray-700 rounded-xl hover:bg-gray-50 transition-colors">
              <i class="fas fa-arrow-left mr-2"></i>
              Back to Subsidiaries
            </a>
          </div>
        </div>
      </div>
    </template>

    <!-- Logo Upload Modal -->
    <div x-show="showLogoModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50" x-cloak>
      <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6" @click.away="showLogoModal = false">
        <h3 class="text-xl font-bold text-gray-900 mb-4 flex items-center">
          <i class="fas fa-camera mr-2 text-blue-500"></i>
          Update Subsidiary Logo
        </h3>
        <form id="logoUploadForm" enctype="multipart/form-data" @submit.prevent="handleLogoUploadSubmit">
          <div class="space-y-4">
            <div class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center bg-gray-50">
              <img :src="subsidiaryLogo" alt="Current Logo" class="w-24 h-24 rounded-xl mx-auto mb-4 object-cover shadow-sm">
              <input type="file" id="logoUpload" name="logo" accept="image/*" class="hidden" @change="handleLogoUpload">
              <label for="logoUpload" class="cursor-pointer inline-flex items-center px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                <i class="fas fa-upload mr-2"></i>
                Choose New Logo
              </label>
              <p class="text-xs text-gray-500 mt-2">PNG, JPG, GIF, SVG, WebP up to 5MB</p>
            </div>
          </div>
          <div class="mt-6 flex justify-end space-x-3">
            <button type="button" @click="showLogoModal = false" 
                    class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition-colors">
              Cancel
            </button>
            <button type="submit" 
                    class="px-4 py-2 border border-transparent rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors">
              <i class="fas fa-save mr-1"></i>
              Upload Logo
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- KPI Creation Modal -->
    <div x-show="showKpiModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50" x-cloak>
      <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6" @click.away="showKpiModal = false">
        <h3 class="text-xl font-bold text-gray-900 mb-4 flex items-center">
          <i class="fas fa-plus-circle mr-2 text-green-500"></i>
          Add New KPI
        </h3>
        <form @submit.prevent="addNewKpi">
          <div class="space-y-4">
            <!-- Category Selection -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
              <select x-model="newKpi.category_id" required
                      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all bg-white">
                <option value="">Select a Category</option>
                <template x-for="category in categories" :key="category.id">
                  <option :value="category.id" x-text="category.name"></option>
                </template>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">KPI Name</label>
              <input type="text" x-model="newKpi.name" required 
                     class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                     placeholder="Revenue">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
              <textarea x-model="newKpi.description" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                        rows="2" placeholder="Brief description of this KPI..."></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Weight</label>
                <input type="number" x-model="newKpi.weight" min="0.1" step="0.1" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                       value="1">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Target Score</label>
                <input type="number" x-model="newKpi.target" min="0" max="100" step="1" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                       value="80">
              </div>
            </div>
          </div>
          <div class="mt-6 flex justify-end space-x-3">
            <button type="button" @click="showKpiModal = false" 
                    class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition-colors">
              Cancel
            </button>
            <button type="submit" 
                    class="px-4 py-2 border border-transparent rounded-lg text-sm font-medium text-white bg-green-600 hover:bg-green-700 transition-colors">
              <i class="fas fa-plus mr-1"></i>
              Add KPI
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script>
    function scoreEntry() {
      return {
        categories: [
          {
            id: 1,
            name: "Financial Perspective",
            description: "No description available",
            weight: 100,
            used_weight: 1,
            avgScore: 0,
            kpis: [
              {
                id: 1,
                name: "Revenue",
                description: "Brief description of this KPI...",
                weight: 1,
                target: 80,
                calculation_method: "Direct",
                score: null
              }
            ]
          }
        ],
        existingScores: {},
        subsidiaryLogo: 'https://via.placeholder.com/150',
        overallScore: 0,
        completedKPIs: 0,
        totalKPIs: 1,
        totalUsedWeight: 0,
        totalAvailableWeight: 100,
        weightUtilization: 0,
        scoresValid: false,
        showLogoModal: false,
        showKpiModal: false,
        newKpi: {
          name: '',
          description: '',
          weight: 1,
          target: 80,
          category_id: null
        },
        performanceGrade: {
          grade: 'N/A',
          score: 0,
          label: 'Not scored'
        },

        init() {
          // Calculate total KPIs
          this.totalKPIs = this.categories.reduce((total, category) => total + category.kpis.length, 0);
          this.totalAvailableWeight = this.categories.reduce((total, category) => total + category.weight, 0);
          
          // Initialize scores from existing data
          this.categories.forEach(category => {
            category.used_weight = category.kpis.reduce((sum, kpi) => sum + kpi.weight, 0);
            category.kpis.forEach(kpi => {
              kpi.score = this.existingScores[kpi.id]?.actual || null;
            });
          });
          
          this.updateCalculations();
        },

        updateCalculations() {
          let totalWeightedScore = 0;
          let totalWeight = 0;
          this.completedKPIs = 0;
          this.totalUsedWeight = 0;

          this.categories.forEach(category => {
            let categoryScore = 0;
            let categoryWeight = 0;
            let categoryCompleted = 0;

            category.kpis.forEach(kpi => {
              if (kpi.score !== null && !isNaN(kpi.score)) {
                categoryScore += kpi.score * kpi.weight;
                categoryWeight += kpi.weight;
                categoryCompleted++;
                this.completedKPIs++;
              }
            });

            this.totalUsedWeight += categoryWeight;
            
            if (categoryWeight > 0) {
              category.avgScore = categoryScore / categoryWeight;
              totalWeightedScore += categoryScore;
              totalWeight += categoryWeight;
            } else {
              category.avgScore = 0;
            }
          });

          this.overallScore = totalWeight > 0 ? totalWeightedScore / totalWeight : 0;
          this.weightUtilization = this.totalAvailableWeight > 0 ? 
            Math.round((this.totalUsedWeight / this.totalAvailableWeight) * 100) : 0;
          
          this.updatePerformanceGrade();
          this.validateScores();
        },

        updatePerformanceGrade() {
          const score = this.overallScore;
          if (score >= 90) {
            this.performanceGrade = { grade: 'A+', score, label: 'Excellent Performance' };
          } else if (score >= 80) {
            this.performanceGrade = { grade: 'A', score, label: 'Very Good' };
          } else if (score >= 70) {
            this.performanceGrade = { grade: 'B', score, label: 'Good Performance' };
          } else if (score >= 60) {
            this.performanceGrade = { grade: 'C', score, label: 'Satisfactory' };
          } else if (score >= 50) {
            this.performanceGrade = { grade: 'D', score, label: 'Needs Improvement' };
          } else {
            this.performanceGrade = { grade: 'F', score, label: 'Unsatisfactory' };
          }
        },

        scoreColorClass(score, forText = false) {
          if (score >= 80) return forText ? 'text-green-600' : '#10b981';
          if (score >= 60) return forText ? 'text-yellow-600' : '#f59e0b';
          return forText ? 'text-red-600' : '#ef4444';
        },

        weightColorClass(used, total) {
          const percentage = (used / total) * 100;
          if (percentage > 100) return '#ef4444';
          if (percentage > 90) return '#f59e0b';
          return '#3b82f6';
        },

        gapColorClass(gap) {
          return gap <= 0 ? 'text-green-600 font-semibold' : 'text-red-600 font-semibold';
        },

        getScoreStatus(score) {
          if (score >= 90) return 'Excellent';
          if (score >= 80) return 'Very Good';
          if (score >= 70) return 'Good';
          if (score >= 60) return 'Satisfactory';
          if (score >= 50) return 'Needs Improvement';
          return 'Unsatisfactory';
        },

        validateScores() {
          let allValid = true;
          let invalidCount = 0;
          
          this.categories.forEach(category => {
            category.kpis.forEach(kpi => {
              if (kpi.score !== null && (kpi.score < 0 || kpi.score > 100)) {
                allValid = false;
                invalidCount++;
              }
            });
          });

          this.scoresValid = allValid && this.completedKPIs > 0;
          
          if (allValid) {
            this.showToast('✅ All scores are valid!', 'success');
          } else {
            this.showToast(`❌ Found ${invalidCount} invalid scores`, 'error');
          }
          
          return allValid;
        },

        async submitScores() {
          if (!this.scoresValid) {
            this.showToast('❌ Please validate scores before submitting', 'error');
            return;
          }

          const scoresData = {
            subsidiary_id: 1,
            year_id: 2024,
            scores: []
          };

          this.categories.forEach(category => {
            category.kpis.forEach(kpi => {
              if (kpi.score !== null) {
                scoresData.scores.push({
                  kpi_id: kpi.id,
                  value: parseFloat(kpi.score)
                });
              }
            });
          });

          try {
            this.showToast('🔄 Saving scores...', 'info');
            // Simulate API call
            await new Promise(resolve => setTimeout(resolve, 1500));
            this.showToast(`✅ Successfully saved ${scoresData.scores.length} scores`, 'success');
          } catch (error) {
            this.showToast('❌ Error saving scores', 'error');
            console.error('Error:', error);
          }
        },

        handleLogoUpload(event) {
          const file = event.target.files[0];
          if (!file) return;

          // Validate file size (5MB limit)
          if (file.size > 5 * 1024 * 1024) {
            this.showToast('❌ File size must be less than 5MB', 'error');
            return;
          }

          // Validate file type
          const validTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/svg+xml', 'image/webp'];
          if (!validTypes.includes(file.type)) {
            this.showToast('❌ Please select a valid image file (JPEG, PNG, GIF, SVG, WebP)', 'error');
            return;
          }

          // Preview the image
          const reader = new FileReader();
          reader.onload = (e) => {
            const previewImg = document.querySelector('#logoUploadForm img');
            if (previewImg) {
              previewImg.src = e.target.result;
            }
          };
          reader.readAsDataURL(file);
        },

        async handleLogoUploadSubmit() {
          const fileInput = document.getElementById('logoUpload');
          const file = fileInput.files[0];
          
          if (!file) {
            this.showToast('❌ Please select a file to upload', 'error');
            return;
          }

          try {
            this.showToast('🔄 Uploading logo...', 'info');
            // Simulate API call
            await new Promise(resolve => setTimeout(resolve, 1500));
            this.subsidiaryLogo = URL.createObjectURL(file);
            this.showToast('✅ Logo uploaded successfully!', 'success');
            this.showLogoModal = false;
          } catch (error) {
            this.showToast('❌ Error uploading logo', 'error');
            console.error('Error:', error);
          }
        },

        exportScores() {
          this.showToast('📊 Export feature coming soon!', 'info');
        },

        showToast(message, type) {
          Toastify({
            text: message,
            duration: 4000,
            close: true,
            gravity: "top",
            position: "right",
            backgroundColor: type === 'success' ? "#10b981" : 
                           type === 'error' ? "#ef4444" : 
                           type === 'info' ? "#3b82f6" : "#f59e0b",
            stopOnFocus: true,
          }).showToast();
        },

        openKpiModal(categoryId) {
          this.newKpi.category_id = categoryId;
          this.showKpiModal = true;
        },

        async addNewKpi() {
          if (!this.newKpi.category_id) {
            this.showToast('❌ Please select a category for the KPI', 'error');
            return;
          }

          try {
            const kpiData = {
              name: this.newKpi.name,
              description: this.newKpi.description,
              weight: parseFloat(this.newKpi.weight),
              target: parseInt(this.newKpi.target),
              category_id: this.newKpi.category_id,
              subsidiary_id: 1,
              year_id: 2024
            };

            this.showToast('🔄 Creating KPI...', 'info');
            // Simulate API call
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            this.showToast('✅ KPI created successfully', 'success');
            this.showKpiModal = false;
            this.resetNewKpiForm();
            
            // In a real app, you would refresh the data or update the UI
            setTimeout(() => {
              this.showToast('🔄 Page will refresh to show new KPI...', 'info');
              // window.location.reload();
            }, 1000);
            
          } catch (error) {
            this.showToast('❌ Error creating KPI', 'error');
            console.error('Error:', error);
          }
        },

        resetNewKpiForm() {
          this.newKpi = {
            name: '',
            description: '',
            weight: 1,
            target: 80,
            category_id: null
          };
        }
      }
    }
  </script>
</body>
</html>
