<!--backend/app/templates/select_task.html-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Select Task - Portfolio PMC Hub</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url("{{ url_for('static', filename='images/tractorfarms.avif') }}") center center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
      color: #fff;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.3); /* Less dark overlay */
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      display: flex;
      background: rgba(0, 0, 0, 0.3); /* Transparent black */
      border-radius: 10px;
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      width: 800px;
      max-width: 95%;
      color: white;
    }

    .card-image {
      width: 50%;
      background: url("{{ url_for('static', filename='images/tractor.jfif') }}") center center/cover no-repeat;
      min-height: 300px;
    }

    .card-content {
      width: 50%;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    .card-content h1 {
      margin-bottom: 25px;
      font-size: 26px;
      color: #ffffff;
    }

    form {
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button.dashboard {
      background-color: #007bff;
      color: white;
    }

    button.dashboard:hover {
      background-color: #0056b3;
    }

    button.portfolio {
      background-color: #28a745;
      color: white;
    }

    button.portfolio:hover {
      background-color: #1e7e34;
    }

    button.logout {
      background-color: #dc3545;
      color: white;
    }

    button.logout:hover {
      background-color: #a71d2a;
    }

    @media (max-width: 768px) {
      .card {
        flex-direction: column;
      }

      .card-image, .card-content {
        width: 100%;
      }

      .card-image {
        min-height: 200px;
      }

      .card-content {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-image"></div>
    <div class="card-content">
      <h1>Select Your Task</h1>
      <form action="{{ url_for('routes.dashboard') }}" method="get">
        <button type="submit" class="dashboard">Go to Dashboard</button>
      </form>
      <form action="{{ url_for('routes.portfolio') }}" method="get">
        <button type="submit" class="portfolio">Enter Portfolio Data</button>
      </form>
      <form action="{{ url_for('routes.logout') }}" method="get">
        <button type="submit" class="logout">Logout</button>
      </form>
      <form action="{{ url_for('routes.seed_management') }}" method="get">
        <button type="submit" class="home">Seed Data Here</button>
      </form>
    </div>
  </div>
</body>
</html>
